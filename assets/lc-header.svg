  <line x1="28" y1="8" x2="36" y2="8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>

  <line x1="32" y1="50" x2="32" y2="58" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="28" y1="56" x2="36" y2="56" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>

  <line x1="6" y1="32" x2="14" y2="32" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="8" y1="28" x2="8" y2="36" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>

  <line x1="50" y1="32" x2="58" y2="32" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  
 </svg>