<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Long Covid Research Feed</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
    body {
        font-family: Inter, Arial, sans-serif;
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--text);
        transition: background 0.3s, color 0.3s;
    }

    :root {
        --bg: #ffffff;
        --text: #222;
        --card-bg: #fafafa;
        --card-border: #e5e5e5;
    }

    .dark {
        --bg: #111;
        --text: #eaeaea;
        --card-bg: #1b1b1b;
        --card-border: #333;
    }

    header {
        padding: 25px;
        text-align: center;
        border-bottom: 1px solid var(--card-border);
    }

    h1 {
        margin: 0;
        font-size: 2rem;
        font-weight: 700;
    }

    #toggle {
        position: absolute;
        top: 20px;
        right: 20px;
        cursor: pointer;
        padding: 8px 14px;
        border-radius: 6px;
        background: var(--card-bg);
        border: 1px solid var(--card-border);
    }

    .container {
        max-width: 900px;
        margin: auto;
        padding: 20px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
        gap: 20px;
    }

    .paper-card {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        transition: transform 0.15s ease;
    }

    .paper-card:hover {
        transform: translateY(-3px);
    }

    .paper-card h2 {
        margin-top: 0;
        font-size: 1.2rem;
    }

    .date {
        color: #888;
        font-size: 0.9rem;
        margin-bottom: 10px;
    }

    a {
        color: #0077cc;
        text-decoration: none;
        font-weight: 600;
    }

    a:hover {
        text-decoration: underline;
    }
</style>

<script>
function toggleMode() {
    document.body.classList.toggle("dark");
    localStorage.setItem("theme", document.body.classList.contains("dark") ? "dark" : "light");
}
window.onload = () => {
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
    }
};
</script>

</head>
<body>

<button id="toggle" onclick="toggleMode()">🌓 Theme</button>

<header>
    <h1>Long Covid Research Feed</h1>
    <p>Automatically updated with new mechanism & treatment papers.</p>
</header>

<div class="container">
<!-- SCRAPER_INJECT_START -->
<!-- SCRAPER_INJECT_END -->
</div>

</body>
</html>
